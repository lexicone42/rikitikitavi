  blastRadiusTags: ["database"]
  changeType: "standard"
---
id: "rikitikitavi.database.memcached-no-auth"
version: "1.0.0"
summary: "Secure Memcached access"
description: "Memcached responds without authentication, enabling DDoS amplification and cache poisoning."

metadata:
  owner: "rikitikitavi"
  visibility: "public"
  maturity: "stable"
  tags: ["database", "memcached", "authentication"]

match:
  resourceKinds: ["network-service"]

steps:
  - id: "bind-localhost"
    kind: "manual.step"
    params:
      text: "Bind Memcached to 127.0.0.1 (-l 127.0.0.1)."
  - id: "enable-sasl"
    kind: "manual.step"
    params:
      text: "Enable SASL authentication if network access is needed."
  - id: "disable-udp"
    kind: "manual.step"
    params:
      text: "Disable UDP protocol (-U 0) to prevent amplification attacks."
  - id: "firewall-rules"
    kind: "manual.step"
    params:
      text: "Use firewall rules to restrict access."

remediation:
  riskLevel: "high"
  requiresReboot: false
  typicalDurationSeconds: 300
  blastRadiusTags: ["database"]
  changeType: "standard"
---
id: "rikitikitavi.database.postgresql-exposed"
version: "1.0.0"
summary: "Review PostgreSQL authentication configuration"
description: "PostgreSQL is network-accessible and may allow trust authentication from remote hosts."

metadata:
  owner: "rikitikitavi"
  visibility: "public"
  maturity: "stable"
  tags: ["database", "postgresql", "authentication"]

match:
  resourceKinds: ["network-service"]

steps:
  - id: "check-pghba"
    kind: "manual.step"
    params:
      text: "Check pg_hba.conf for 'trust' entries on non-local connections."
  - id: "use-scram"
    kind: "manual.step"
    params:
      text: "Use 'scram-sha-256' instead of 'md5' or 'trust' for auth."
  - id: "bind-specific"
    kind: "manual.step"
    params:
      text: "Bind to specific interfaces via listen_addresses."
  - id: "enable-ssl"
    kind: "manual.step"
    params:
      text: "Enable SSL for encrypted connections."

remediation:
  riskLevel: "medium"
  requiresReboot: false
  typicalDurationSeconds: 600
  blastRadiusTags: ["database"]
  changeType: "standard"
