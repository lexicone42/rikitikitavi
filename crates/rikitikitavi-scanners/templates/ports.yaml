id: "rikitikitavi.ports.telnet-open"
version: "1.0.0"
summary: "Disable Telnet and use SSH instead"
description: "Telnet transmits all data including credentials in cleartext."

metadata:
  owner: "rikitikitavi"
  visibility: "public"
  maturity: "stable"
  tags: ["telnet", "cleartext", "ports"]

steps:
  - id: "disable-telnet"
    kind: "manual.step"
    params:
      text: "Disable the Telnet service on the device."
  - id: "enable-ssh"
    kind: "manual.step"
    params:
      text: "Enable SSH (port 22) as a secure replacement."
  - id: "block-port"
    kind: "manual.step"
    params:
      text: "Block port 23 on your firewall."

remediation:
  riskLevel: "high"
  requiresReboot: false
  typicalDurationSeconds: 300
  blastRadiusTags: ["remote-access"]
  changeType: "standard"
---
id: "rikitikitavi.ports.ftp-open"
version: "1.0.0"
summary: "Replace FTP with SFTP or FTPS"
