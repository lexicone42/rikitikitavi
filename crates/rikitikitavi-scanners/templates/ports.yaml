    params:
      text: "Disable the FTP service on the device."
  - id: "enable-sftp"
    kind: "manual.step"
    params:
      text: "Enable SFTP (via SSH) or FTPS as a secure alternative."
  - id: "block-port"
    kind: "manual.step"
    params:
      text: "Block port 21 on your firewall."

remediation:
  riskLevel: "medium"
  requiresReboot: false
  typicalDurationSeconds: 600
  blastRadiusTags: ["file-sharing"]
  changeType: "standard"
