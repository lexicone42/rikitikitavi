id: "rikitikitavi.ports.unencrypted-mail"
version: "1.0.0"
summary: "Switch to encrypted mail protocols (POP3S/IMAPS)"
description: "Unencrypted mail protocol transmits credentials and messages in cleartext."

metadata:
  owner: "rikitikitavi"
  visibility: "public"
  maturity: "stable"
  tags: ["mail", "cleartext", "ports"]

steps:
  - id: "enable-tls"
    kind: "manual.step"
    params:
      text: "Enable TLS on the mail server for POP3S (995) and IMAPS (993)."
  - id: "disable-cleartext"
    kind: "manual.step"
    params:
      text: "Disable the unencrypted POP3 (110) and IMAP (143) ports."
  - id: "update-clients"
    kind: "manual.step"
    params:
      text: "Update mail clients to use the encrypted ports."

remediation:
  riskLevel: "medium"
  requiresReboot: false
  typicalDurationSeconds: 600
  blastRadiusTags: ["mail"]
  changeType: "standard"
---
id: "rikitikitavi.ports.mqtt-unencrypted"
version: "1.0.0"
summary: "Enable MQTT over TLS (port 8883)"
description: "MQTT without TLS transmits IoT messages in cleartext."

metadata:
  owner: "rikitikitavi"
  visibility: "public"
  maturity: "stable"
  tags: ["mqtt", "iot", "cleartext", "ports"]

steps:
  - id: "enable-tls"
    kind: "manual.step"
    params:
      text: "Configure the MQTT broker to require TLS on port 8883."
  - id: "disable-cleartext"
    kind: "manual.step"
    params:
      text: "Disable the unencrypted MQTT listener on port 1883."
  - id: "update-clients"
    kind: "manual.step"
    params:
      text: "Update IoT device MQTT configurations to use port 8883 with TLS."

remediation:
  riskLevel: "medium"
  requiresReboot: false
  typicalDurationSeconds: 600
  blastRadiusTags: ["iot"]
  changeType: "standard"
