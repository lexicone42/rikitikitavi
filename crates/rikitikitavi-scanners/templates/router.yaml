---
id: "rikitikitavi.router.upnp-enabled"
version: "1.0.0"
summary: "Disable UPnP on the router"
description: "Router has UPnP enabled, allowing any device to open ports."

metadata:
  owner: "rikitikitavi"
  visibility: "public"
  maturity: "stable"
  tags: ["router", "upnp"]

steps:
  - id: "login-router"
    kind: "manual.step"
    params:
      text: "Log into your router's admin interface."
  - id: "disable-upnp"
    kind: "manual.step"
    params:
      text: "Disable UPnP in the router's advanced or NAT settings."
  - id: "manual-forwards"
    kind: "manual.step"
    params:
      text: "Create manual port forwarding rules only for services that need external access."

remediation:
  riskLevel: "medium"
  requiresReboot: false
  typicalDurationSeconds: 300
  blastRadiusTags: ["router", "network-config"]
