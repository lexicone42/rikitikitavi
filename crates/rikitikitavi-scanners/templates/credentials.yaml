id: "rikitikitavi.credentials.anonymous-ftp"
version: "1.0.0"
summary: "Disable anonymous FTP access"
description: "FTP server accepts anonymous login, allowing anyone to read and possibly write files."

metadata:
  owner: "rikitikitavi"
  visibility: "public"
  maturity: "stable"
  tags: ["ftp", "credentials", "anonymous"]

match:
  resourceKinds: ["network-service"]

steps:
  - id: "open-config"
    kind: "manual.step"
    params:
      text: "Open the FTP server configuration."
  - id: "disable-anon"
    kind: "manual.step"
    params:
      text: "Disable anonymous login."
  - id: "require-accounts"
    kind: "manual.step"
    params:
      text: "Require named user accounts with strong passwords."
  - id: "switch-sftp"
    kind: "manual.step"
    params:
      text: "Consider switching to SFTP instead."

remediation:
  riskLevel: "high"
  requiresReboot: false
  typicalDurationSeconds: 300
  blastRadiusTags: ["file-sharing"]
  changeType: "standard"
---
id: "rikitikitavi.credentials.http-no-auth"
version: "1.0.0"
summary: "Enable authentication on the web admin interface"
description: "Web admin panel is accessible without any authentication."

metadata:
  owner: "rikitikitavi"
  visibility: "public"
  maturity: "stable"
  tags: ["http", "credentials", "admin"]

steps:
  - id: "enable-auth"
    kind: "manual.step"
    params:
      text: "Enable authentication on the admin interface."
  - id: "set-password"
    kind: "manual.step"
    params:
      text: "Set a strong admin password."
  - id: "enable-https"
    kind: "manual.step"
    params:
      text: "Ensure the admin panel uses HTTPS."

remediation:
  riskLevel: "medium"
  requiresReboot: false
  typicalDurationSeconds: 300
  blastRadiusTags: ["admin"]
  changeType: "standard"
---
id: "rikitikitavi.credentials.telnet-default"
version: "1.0.0"
summary: "Disable Telnet and change default credentials"
description: "Telnet service may be using default credentials and transmits in cleartext."

metadata:
  owner: "rikitikitavi"
  visibility: "public"
  maturity: "stable"
  tags: ["telnet", "credentials", "default-password"]

steps:
  - id: "disable-telnet"
    kind: "manual.step"
    params:
      text: "Disable the Telnet service entirely."
  - id: "change-defaults"
    kind: "manual.step"
    params:
      text: "If Telnet cannot be disabled, change all default credentials immediately."
  - id: "enable-ssh"
    kind: "manual.step"
    params:
      text: "Enable SSH as a secure alternative for remote access."

remediation:
  riskLevel: "high"
  requiresReboot: false
  typicalDurationSeconds: 300
  blastRadiusTags: ["remote-access"]
  changeType: "standard"
---
id: "rikitikitavi.credentials.rdp-exposed"
version: "1.0.0"
summary: "Secure RDP with NLA and VPN access"
description: "RDP is exposed without additional network-level protection."

metadata:
  owner: "rikitikitavi"
  visibility: "public"
  maturity: "stable"
  tags: ["rdp", "credentials", "remote-access"]

steps:
  - id: "enable-nla"
    kind: "manual.step"
    params:
      text: "Enable Network Level Authentication (NLA) on the RDP host."
  - id: "require-vpn"
    kind: "manual.step"
    params:
      text: "Require VPN access before allowing RDP connections."
  - id: "strong-password"
    kind: "manual.step"
    params:
      text: "Enforce strong passwords and account lockout policies."

remediation:
  riskLevel: "medium"
  requiresReboot: false
  typicalDurationSeconds: 600
  blastRadiusTags: ["remote-access"]
  changeType: "standard"
---
id: "rikitikitavi.credentials.smb-exposed"
version: "1.0.0"
summary: "Disable guest SMB access and require authentication"
description: "SMB file sharing is exposed and may allow guest or anonymous access."

metadata:
  owner: "rikitikitavi"
  visibility: "public"
  maturity: "stable"
  tags: ["smb", "credentials", "file-sharing"]

steps:
  - id: "disable-guest"
    kind: "manual.step"
    params:
      text: "Disable guest and anonymous SMB access."
  - id: "require-auth"
    kind: "manual.step"
    params:
      text: "Require user authentication for all file shares."
  - id: "restrict-access"
    kind: "manual.step"
    params:
      text: "Restrict SMB access to authorized hosts via firewall rules."

remediation:
  riskLevel: "medium"
  requiresReboot: false
  typicalDurationSeconds: 600
  blastRadiusTags: ["file-sharing"]
  changeType: "standard"
